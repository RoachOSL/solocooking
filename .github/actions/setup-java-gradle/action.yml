name: Set up Java and Gradle
description: Set up JDK, Gradle wrapper permissions, and Gradle cache

inputs:
  cache-read-only:
    description: Whether Gradle cache should be read-only
    required: true

runs:
  using: composite
  steps:
    - name: Make Gradle wrapper executable
      shell: bash
      run: chmod +x ./gradlew

    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: '25'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v6
      with:
        cache-read-only: ${{ inputs.cache-read-only }}
