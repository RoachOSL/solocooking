name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  code-quality:
    name: Code quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Set up Java and Gradle
        uses: ./.github/actions/setup-java-gradle
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Check formatting
        run: ./gradlew spotlessCheck --no-daemon

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Set up Java and Gradle
        uses: ./.github/actions/setup-java-gradle
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build application
        run: ./gradlew assemble --no-daemon

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      actions: read
      checks: write

    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Set up Java and Gradle
        uses: ./.github/actions/setup-java-gradle
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Publish unit test report
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: Unit tests
          path: build/test-results/test/*.xml
          reporter: java-junit
          list-suites: failed
          list-tests: failed
          list-files: failed
          max-annotations: '10'

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    # Keep integration tests after unit tests to fail fast before starting Testcontainers.
    needs: unit-tests
    permissions:
      contents: read
      actions: read
      checks: write

    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Set up Java and Gradle
        uses: ./.github/actions/setup-java-gradle
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Run integration tests
        run: ./gradlew integrationTest --no-daemon

      - name: Publish integration test report
        if: ${{ !cancelled() }}
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          name: Integration tests
          path: build/test-results/integrationTest/*.xml
          reporter: java-junit
          list-suites: failed
          list-tests: failed
          list-files: failed
          max-annotations: '10'
