name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    name: Code quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java and Gradle
        uses: ./.github/actions/setup-java-gradle

      - name: Check formatting
        run: ./gradlew spotlessCheck --no-daemon

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java and Gradle
        uses: ./.github/actions/setup-java-gradle

      - name: Build application
        run: ./gradlew assemble --no-daemon

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      actions: read
      checks: write

    steps:
      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java and Gradle
        uses: ./.github/actions/setup-java-gradle

      - name: Run unit tests
        run: ./gradlew test -x jacocoTestReport --no-daemon

      - name: Publish unit test report
        if: ${{ !cancelled() }}
        uses: ./.github/actions/publish-test-report
        with:
          name: Unit tests
          path: build/test-results/test/*.xml

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read
      actions: read
      checks: write

    steps:
      - name: Checkout sources
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java and Gradle
        uses: ./.github/actions/setup-java-gradle

      - name: Run integration tests
        run: ./gradlew integrationTest -x jacocoTestReport --no-daemon

      - name: Publish integration test report
        if: ${{ !cancelled() }}
        uses: ./.github/actions/publish-test-report
        with:
          name: Integration tests
          path: build/test-results/integrationTest/*.xml
